<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOL Manager | FlowersPowerz</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.07); }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-add { background: linear-gradient(135deg, var(--primary), var(--secondary)); margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .device-list { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .device-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .device-item:hover { background: rgba(255,255,255,0.06); }
        .device-info h3 { font-size: 1rem; color: var(--primary); }
        .device-info p { font-size: 0.8rem; color: rgba(255,255,255,0.5); font-family: monospace; }

        .btn-delete { width: 40px; height: 40px; background: rgba(255,77,77,0.1); color: #ff4d4d; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .btn-delete:hover { background: #ff4d4d; color: white; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); display: flex; justify-content: center; align-items: center; z-index: 1000; }

        #logout-btn { color: var(--primary); cursor: pointer; font-size: 0.8rem; text-align: right; margin-top: 20px; display: block; }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="glass-card" style="max-width: 350px;">
            <h1><i class="fas fa-lock"></i> Login</h1>
            <form id="login-form">
                <input type="password" id="admin-auth" placeholder="Admin Password" required style="margin-bottom: 15px;">
                <button type="submit" class="btn btn-add">Enter</button>
            </form>
            <div id="login-status" style="color: #ff4d4d; text-align: center; margin-top: 10px;"></div>
        </div>
    </div>

    <main id="dashboard" style="display: none; width: 100%; max-width: 500px;">
        <div class="glass-card">
            <h1><i class="fas fa-microchip"></i> WOL Center</h1>

            <form id="add-form">
                <div class="input-group">
                    <label>Device Name</label>
                    <input type="text" id="new-name" placeholder="e.g. Office, Gaming PC..." required>
                </div>
                <div class="input-group">
                    <label>MAC Address</label>
                    <input type="text" id="new-mac" placeholder="aa:bb:cc:dd:ee:ff" required>
                </div>
                <button type="submit" class="btn btn-add"><i class="fas fa-plus"></i> Add Device</button>
            </form>

            <div class="device-list" id="device-list">
                <!-- Devices loaded here -->
            </div>

            <a id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </main>

    <script>
        const loginOverlay = document.getElementById('login-overlay');
        const loginForm = document.getElementById('login-form');
        const dashboard = document.getElementById('dashboard');
        const listContainer = document.getElementById('device-list');
        const macInput = document.getElementById('new-mac');

        macInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9a-fA-F]/g, '');
            if (value.length > 12) value = value.slice(0, 12);
            const chunks = value.match(/.{1,2}/g);
            if (chunks) e.target.value = chunks.join(':').toLowerCase();
        });

        async function apiRequest(method, body = null) {
            const password = localStorage.getItem('admin_password');
            const options = {
                method,
                headers: { 'Content-Type': 'application/json', 'x-admin-password': password }
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch('/api/manage', options);
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        function logout() {
            localStorage.removeItem('admin_password');
            window.location.reload();
        }

        async function renderDevices() {
            const devices = await apiRequest('GET');
            if (!devices) return;

            listContainer.innerHTML = devices.length ? '' : '<p style="text-align:center; padding: 20px;">No devices configured.</p>';

            devices.forEach(dev => {
                const item = document.createElement('div');
                item.className = 'device-item';
                item.innerHTML = `
                    <div class="device-info">
                        <h3>${dev.name}</h3>
                        <p>${dev.mac}</p>
                    </div>
                    <button class="btn-delete" onclick="deleteDevice('${dev.mac}')">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                listContainer.appendChild(item);
            });
        }

        window.deleteDevice = async (mac) => {
            if (confirm('Delete this device?')) {
                await apiRequest('DELETE', { mac });
                renderDevices();
            }
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-auth').value;
            localStorage.setItem('admin_password', pass);
            const test = await apiRequest('GET');
            if (test) {
                loginOverlay.style.display = 'none';
                dashboard.style.display = 'block';
                renderDevices();
            } else {
                document.getElementById('login-status').innerText = '❌ Incorrect password.';
            }
        });

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('new-name').value;
            const mac = document.getElementById('new-mac').value;
            await apiRequest('POST', { name, mac });
            document.getElementById('add-form').reset();
            renderDevices();
        });

        document.getElementById('logout-btn').addEventListener('click', logout);

        if (localStorage.getItem('admin_password')) {
            apiRequest('GET').then(res => {
                if (res) {
                    loginOverlay.style.display = 'none';
                    dashboard.style.display = 'block';
                    renderDevices();
                }
            });
        }
    </script>
</body>
</html>
